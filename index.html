<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B+-Math</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 TOP BAR -->
<header class="topbar">
  <div class="logo">B+-Math</div>

  <input id="search" placeholder="Search games..." />

  <div class="top-icons">
    <button id="requestBtn">➕</button>
  </div>
</header>

<!-- 🎮 GAME GRID -->
<main>
  <div id="gameGrid" class="grid"></div>
</main>

<!-- 🎮 MODAL -->
<div id="gameModal" class="modal hidden">

  <div class="modalTop">
    <span id="gameTitle"></span>

    <div class="modalButtons">
      <button id="fullscreenBtn">Fullscreen</button>
      <button id="newTabBtn">New Tab</button>
      <button id="closeBtn">✖</button>
    </div>
  </div>

  <iframe id="gameFrame" src="about:blank"></iframe>

</div>

<!-- 📩 REQUEST PANEL -->
<div id="requestPanel" class="panel hidden">
  <h3>Game Requests</h3>
  <input id="requestInput" placeholder="Request a game..." />
  <button id="submitRequest">Submit</button>
  <ul id="requestList"></ul>
</div>

<!-- ✅ SCRIPTS (MODERN SAFE ORDER) -->
<script src="games/game-list.js"></script>
<script src="script.js"></script>

</body>
</html>
