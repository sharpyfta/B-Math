<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>B+-Math</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">B+-Math</div>

  <input id="search" placeholder="Search Games On B+ Math..." />

  <div class="top-icons">
    <button id="requestBtn">➕</button>
  </div>
</header>

<!-- 🎵 MUSIC BAR -->
<div class="musicBar">
  <input id="musicSearch" placeholder="Search music (e.g. Golden)" />
  <div id="musicResults"></div>
</div>

<!-- 🎮 GAME GRID -->
<main>
  <div id="gameGrid" class="grid"></div>
</main>

<!-- 🎮 GAME MODAL -->
<div id="gameModal" class="modal hidden">
  <div class="modalTop">
    <span id="gameTitle"></span>
    <button onclick="fullscreenGame()">Fullscreen</button>
    <button onclick="openNewTab()">New Tab</button>
    <button onclick="closeGame()">✖</button>
  </div>
  <iframe id="gameFrame"></iframe>
</div>

<!-- 🎵 MUSIC PLAYER -->
<div id="musicPlayer" class="musicPlayer hidden">
  <button onclick="closeMusic()">✖</button>
  <div id="nowPlaying"></div>
  <iframe id="musicFrame"></iframe>
</div>

<!-- 📩 REQUEST PANEL -->
<div id="requestPanel" class="panel hidden">
  <h3>Game Requests</h3>
  <input id="requestInput" placeholder="Request a game..." />
  <button onclick="addRequest()">Submit</button>
  <ul id="requestList"></ul>
</div>

  <script src="../games/game-list.js"></script>
<script src="../script.js"></script>
</body>
</html>
